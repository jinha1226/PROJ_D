name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.2

jobs:
  build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Write build version
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d-%H%M)
          printf "%s @ %s" "$SHA_SHORT" "$DATE" > version.txt
          cat version.txt

      - name: Import assets
        run: |
          # Run twice to settle UID cache for ~5,331 ULPC PNGs on first run.
          godot --headless --import || true
          godot --headless --import || true

      - name: Web Build
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html

      - name: Add 404 fallback
        run: cp build/web/index.html build/web/404.html

      - name: Add COI service worker (SharedArrayBuffer shim)
        run: |
          curl -sL https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js -o build/web/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script></head>|' build/web/index.html
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script></head>|' build/web/404.html

      - name: Inject cache-busting headers
        run: |
          BUILD_ID=$(date +%s)
          sed -i "s|<head>|<head><meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\"><meta name=\"build-id\" content=\"${BUILD_ID}\">|" build/web/index.html
          sed -i "s|<head>|<head><meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\"><meta name=\"build-id\" content=\"${BUILD_ID}\">|" build/web/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
